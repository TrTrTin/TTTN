<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- Hero -->
    <section class="hero position-relative">

        <!-- Background -->
        <div class="background">
            <img src="../assets/images/BGTRANGVOTING1.png" alt="Background" class="img-fluid w-100">
        </div>

        <!-- Header -->
        <header class="header position-absolute top-0 start-0 w-100">

            <div class="container-fluid px-lg-5 px-md-4 px-3">

                <div class="d-flex justify-content-between align-items-center">

                    <!-- Left -->
                    <div class="header-left">

                        <a href="#dang-ky-du-thi">
                            <img src="../assets/images/iconapp.png" alt="Logo" class="logo-img">
                        </a>

                    </div>

                    <!-- Right -->
                    <div class="header-right d-flex align-items-center gap-3">

                        <a href="./index.html">
                            <img src="../assets/images/home.png" alt="Home" class="home-icon">
                        </a>

                        <a href="https://facebook.com" target="_blank">
                            <img src="../assets/images/facebook.png" alt="Facebook" class="facebook-icon">
                        </a>

                        <a href="./login.html">
                            <img src="../assets/images/đn.png" alt="Đăng nhập" class="login-btn">
                        </a>

                    </div>

                </div>

            </div>

        </header>
        <!-- Banner Overlay -->
        <div class="banner-overlay position-absolute start-50 translate-middle-x">

            <!-- logo-haokhi -->
            <div class="text-center">
                <img src="../assets/images/Logo-HaoKhiDuHiep.png" alt="Banner 1" class="img-fluid banner-image-1">
            </div>

            <!-- Image text -->
            <div class="text-center mt-3">
                <img src="../assets/images/text.png" alt="Banner 2" class="img-fluid banner-image-2">
            </div>

            <!-- khung dau trang -->
            <div class="text-center mt-3">
                <img src="../assets/images/khungdautrang.png" alt="Banner 2" class="img-fluid banner-image-3">
            </div>


            <!-- Menu Overlay -->
            <div
                class="menu-overlay d-flex flex-lg-nowrap flex-wrap justify-content-center justify-content-lg-between align-items-center">
                <!-- Nhóm trái -->
                <div class="menu-left d-flex justify-content-center align-items-center gap-2 gap-lg-3">
                    <a href="#" data-bs-toggle="modal" data-bs-target="#ruleModal">
                        <img src="../assets/images/thele.png" alt="Menu 1" class="menu-item">
                    </a>

                    <a href="#" data-bs-toggle="modal" data-bs-target="#guideModal">
                        <img src="../assets/images/hd.png" alt="Menu 2" class="menu-item">
                    </a>
                </div>

                <!-- Nhóm giữa -->
                <div class="menu-center">
                    <a href="#dang-ky-du-thi">
                        <img src="../assets/images/votengay.png" alt="Menu Center" class="menu-item menu-center-item">
                    </a>
                </div>

                <!-- Nhóm phải -->
                <div class="menu-right d-flex align-items-center gap-3">
                    <a href="./page3.html">
                        <img src="../assets/images/taigame.png" alt="Menu 3" class="menu-item">
                    </a>

                    <a href="./page4.html">
                        <img src="../assets/images/napthe.png" alt="Menu 4" class="menu-item">
                    </a>
                </div>

            </div>

        </div>

        <!-- dang ky du thi -->
        <section id="dang-ky-du-thi" class="banner-bottom text-center position-absolute start-50 translate-middle-x">
            <img src="../assets/images/đkdt.png" alt="Banner Bottom" class="img-fluid banner-bottom-img">
        </section>

        <!-- ==========================================
          CONTEST FORM
        ========================================== -->
        <section id="contest-form" class="contest-form">

            <div class="container">

                <div class="row g-4 align-items-stretch">

                    <!-- ==========================
                 LEFT
            =========================== -->
                    <div class="col-lg-6">

                        <div class="contest-left">

                            <!-- Ảnh chính -->
                            <div class="main-image-box">

                                <a href="#">
                                    <img src="../assets/images/themanh.png" alt="Ảnh dự thi"
                                        class="img-fluid contest-main-img">
                                </a>

                            </div>

                            <!-- 3 ảnh phụ -->
                            <div class="row g-3 mt-2">

                                <div class="col-4">
                                    <a href="#">
                                        <img src="../assets/images/themanhnho.png" class="img-fluid contest-sub-img"
                                            alt="">
                                    </a>
                                </div>

                                <div class="col-4">
                                    <a href="#">
                                        <img src="../assets/images/themanhnho.png" class="img-fluid contest-sub-img"
                                            alt="">
                                    </a>
                                </div>

                                <div class="col-4">
                                    <a href="#">
                                        <img src="../assets/images/themanhnho.png" class="img-fluid contest-sub-img"
                                            alt="">
                                    </a>
                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- ==========================
                 RIGHT
            =========================== -->
                    <div class="col-lg-6">

                        <div class="contest-right">

                            <!-- ======================
                         1. Thông tin nhân vật
                    ======================= -->
                            <div class="player-info">

                                <div class="d-flex">

                                    <div class="info-title">

                                        <p>Nhân vật:</p>
                                        <p>Bang hội:</p>
                                        <p>Máy chủ:</p>

                                    </div>

                                    <div class="info-content ms-2">

                                        <p>Lục Trà Bạc Hà</p>
                                        <p>Lạc Viên</p>
                                        <p>S1 - Lý Bạch</p>

                                    </div>

                                </div>

                            </div>

                            <!-- ======================
                         2. Giới tính
                    ======================= -->
                            <div class="gender-select mt-3">

                                <div class="d-flex align-items-center gap-4">

                                    <!-- Miss -->
                                    <label class="d-flex align-items-center gap-2">

                                        <input type="radio" name="gender" value="miss">

                                        <img src="../assets/images/thimiss.png" alt="Miss" class="gender-img">

                                    </label>

                                    <!-- Mister -->
                                    <label class="d-flex align-items-center gap-2">

                                        <input type="radio" name="gender" value="mister">

                                        <img src="../assets/images/thimisster.png" alt="Mister" class="gender-img">

                                    </label>

                                </div>

                            </div>

                            <!-- ======================
                         3. Thông tin cá nhân
                    ======================= -->
                            <div class="personal-info mt-4">

                                <!-- Địa chỉ -->
                                <div class="input-box input-address mb-3">

                                    <span class="input-title">
                                        Nhập địa chỉ liên hệ nhận thưởng
                                    </span>

                                    <input type="text" class="input-field">

                                </div>

                                <div class="row g-3">

                                    <!-- SĐT -->
                                    <div class="col-6">

                                        <div class="input-box input-phone">

                                            <span class="input-title">
                                                Nhập số điện thoại
                                            </span>

                                            <input type="text" class="input-field">

                                        </div>

                                    </div>

                                    <!-- Khu vực -->
                                    <div class="col-6">

                                        <div class="input-box input-area">

                                            <span class="input-title">
                                                Chọn khu vực
                                            </span>

                                            <input type="text" class="input-field">

                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- ======================
                         4. CCCD
                    ======================= -->
                            <div class="cccd-upload mt-4">

                                <p class="cccd-title">
                                    Nhập ảnh CMND/CCCD mặt trước và sau
                                </p>

                                <div class="row g-3">

                                    <div class="col-6">

                                        <a href="#">
                                            <img src="../assets/images/mattruoc.png" class="img-fluid cccd-img" alt="">
                                        </a>

                                    </div>

                                    <div class="col-6">

                                        <a href="#">
                                            <img src="../assets/images/matsau.png" class="img-fluid cccd-img" alt="">
                                        </a>

                                    </div>

                                </div>

                            </div>

                            <!-- ======================
                         5. Nội dung
                    ======================= -->
                            <div class="contest-content mt-4">

                                <div class="input-box input-introduce mb-3">

                                    <span class="input-title">
                                        Nhập nội dung giới thiệu (không quá 300 kí tự)
                                    </span>

                                    <textarea class="input-field textarea-field"></textarea>

                                </div>

                                <div class="input-box input-video">

                                    <span class="input-title">
                                        Nhập video dự thi
                                    </span>

                                    <input type="text" class="input-field">

                                </div>

                            </div>

                            <!-- ======================
                         6. Button
                    ======================= -->
                            <div class="contest-button mt-4">

                                <div class="row">

                                    <div class="col-6">

                                        <a  href="#"
                                            data-bs-toggle="modal"
                                            data-bs-target="#dongy">

                                            <img src="../assets/images/buttondongy.png" class="img-fluid submit-btn"
                                                alt="Đồng ý">

                                        </a>

                                    </div>

                                    <div class="col-6">

                                        <a href="#">

                                            <img src="../assets/images/buttonhuybo.png" class="img-fluid submit-btn"
                                                alt="Huỷ">

                                        </a>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>



    </section>



    <!-- ==========================
     RULE MODAL
    ========================== -->

    <div class="modal fade" id="ruleModal" tabindex="-1" aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered modal-xl">

            <div class="modal-content border-0 bg-transparent">

                <img src="../assets/images/popup_thele.png" alt="Thể lệ" class="img-fluid popup-image"
                    data-bs-dismiss="modal">

            </div>

        </div>

    </div>


    <!-- ==========================
     GUIDE MODAL
    ========================== -->

    <div class="modal fade"
        id="guideModal"
        tabindex="-1"
        aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered modal-xl">

            <div class="modal-content border-0 bg-transparent">

                <img src="../assets/images/popup_huongdan.png"
                    alt="Hướng dẫn"
                    class="img-fluid popup-image"
                    data-bs-dismiss="modal">

            </div>

        </div>

    </div>


    <!-- ==========================
     AGREE MODAL
    ========================== -->

    <div class="modal fade"
        id="dongy"
        tabindex="-1"
        aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered modal-xl">

            <div class="modal-content border-0 bg-transparent">

                <div class="agree-popup" data-bs-dismiss="modal">

                    <img src="../assets/images/khungtrong.png"
                        alt="Đăng ký thành công"
                        class="img-fluid popup-image">

                    <div class="agree-popup-text">
                        Đăng ký thành công
                    </div>

                </div>

            </div>

        </div>

    </div>
    <!-- Bootstrap -->
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
